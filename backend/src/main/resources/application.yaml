spring:
  application:
    name: ai-text-intelligence-dashboard
  ai:
    openai:
      api-key: ${OPENAI_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.0

app:
  llm:
    models:
      primary:
        name: gpt-4o
        input-price-per-thousand-tokens: 0.0025
        output-price-per-thousand-tokens: 0.010
      fallback:
        - name: gpt-4o-mini
          input-price-per-thousand-tokens: 0.00015
          output-price-per-thousand-tokens: 0.0006
    retry:
      max-attempts: 3
      base-delay-ms: 1000
    timeout:
      connect-ms: 5000
      read-ms: 30000
  conversation:
    max-messages: 20
    expiry-seconds: 3600
    cleanup-rate-ms: 600000

server:
  port: 8080
