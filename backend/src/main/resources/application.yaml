spring:
  application:
    name: ai-text-intelligence-dashboard
  ai:
    openai:
      api-key: ${OPENAI_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.0

app:
  llm:
    fallback-model: gpt-4o-mini
    retry:
      max-attempts: 3
      base-delay-ms: 1000
    timeout:
      connect-ms: 5000
      read-ms: 30000

server:
  port: 8080
